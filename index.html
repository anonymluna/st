<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Letstry Login</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#0d1117;
      color:white;
    }

    .login-box{
      width:350px;
      padding:40px;
      background:#161b22;
      border-radius:14px;
      box-shadow:0 0 25px rgba(0,0,0,0.5);
    }

    .title{
      text-align:center;
      font-size:32px;
      margin-bottom:30px;
      color:#58a6ff;
      font-weight:bold;
    }

    .input-group{
      margin-bottom:20px;
    }

    .input-group label{
      display:block;
      margin-bottom:8px;
      color:#c9d1d9;
      font-size:14px;
    }

    .input-group input{
      width:100%;
      padding:12px;
      border:none;
      outline:none;
      border-radius:8px;
      background:#21262d;
      color:white;
      font-size:14px;
    }

    .input-group input:focus{
      border:1px solid #58a6ff;
    }

    .login-btn{
      width:100%;
      padding:12px;
      border:none;
      border-radius:8px;
      background:#238636;
      color:white;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
    }

    .login-btn:hover{
      background:#2ea043;
    }

    .footer{
      text-align:center;
      margin-top:18px;
      font-size:14px;
      color:#8b949e;
    }

    .footer a{
      color:#58a6ff;
      text-decoration:none;
    }
  </style>
</head>

<body>

  <div class="login-box">
    <div class="title">Letstry</div>

    <form>
      <div class="input-group">
        <label>Email</label>
        <input type="email" placeholder="Enter your email" required>
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" placeholder="Enter your password" required>
      </div>

      <button class="login-btn" type="submit">
        Login
      </button>

      <div class="footer">
        Don't have an account?
        <a href="#">Sign Up</a>
      </div>
    </form>
  </div>

</body>
</html>
